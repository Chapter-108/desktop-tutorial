name: Deploy static site to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Rsync static files to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_REMOTE_PATH: ${{ secrets.VPS_REMOTE_PATH }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -e
          test -n "$VPS_USER"
          test -n "$VPS_HOST"
          test -n "$VPS_REMOTE_PATH"
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "README.md" \
            -e "ssh -p $PORT" ./ "$VPS_USER@$VPS_HOST:$VPS_REMOTE_PATH/"
