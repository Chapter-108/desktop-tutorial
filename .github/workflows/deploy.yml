name: Deploy static site to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Rsync static files to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_REMOTE_PATH: ${{ secrets.VPS_REMOTE_PATH }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -e
          if [ -z "$VPS_USER" ]; then
            echo "ERROR: VPS_USER is empty"; exit 1;
          fi
          if [ -z "$VPS_HOST" ]; then
            echo "ERROR: VPS_HOST is empty"; exit 1;
          fi
          if [ -z "$VPS_REMOTE_PATH" ]; then
            echo "ERROR: VPS_REMOTE_PATH is empty"; exit 1;
          fi
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          echo "Using host=$VPS_HOST port=$PORT user=$VPS_USER path=$VPS_REMOTE_PATH"
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -o BatchMode=yes -o ConnectTimeout=10 -p "$PORT" "$VPS_USER@$VPS_HOST" "echo SSH_OK"
          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "README.md" \
            -e "ssh -p $PORT" ./ "$VPS_USER@$VPS_HOST:$VPS_REMOTE_PATH/"
